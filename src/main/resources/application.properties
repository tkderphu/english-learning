server.port=7000
# Bind all interfaces (LAN / emulator). Override if needed.
server.address=0.0.0.0
server.forward-headers-strategy=framework
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.use-root-path=true
springdoc.api-docs.resolve-schema-properties=true
spring.application.name=english
spring.datasource.url=jdbc:mysql://localhost:3306/english?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.security.jwt.access-token.minutes=43200
spring.security.jwt.refresh-token.minutes=432000
# Base64 secret (see JwtService). Override JWT_SECRET in production.
spring.security.jwt.secret-key=${JWT_SECRET:dGVzdC1sb2NhbC1qd3Qtc2VjcmV0LWZvci11bml0LXRlc3RzLXJ1bg==}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.otp.ttl.minutes=5

# Local file storage path (relative to project working dir). Can be absolute.
file.storage.path=uploads

openai.api.key=${GROQ_API_KEY:}
openai.base.url=https://api.groq.com/openai/v1
ai.provider=groq
ai.text.path=/chat/completions

# model cho roleplay (use lighter model to reduce 429 during testing)
openai.model.roleplay=llama-3.1-8b-instant

# model cho feedback/summary
openai.model.feedback=llama-3.1-8b-instant

# model cho STT
openai.model.transcription=whisper-large-v3-turbo

openai.retry.max-attempts=3
openai.retry.initial-delay-ms=800
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Android emulator default; override with APP_SERVER_BASE_URL for device/LAN.
app.server.base-url=${APP_SERVER_BASE_URL:http://10.0.2.2:7000}
server.enable.domain=false

server.public.domain=https://english.kimchimar3.store
whisper.server.url=${WHISPER_SERVER_URL:http://localhost:8080}
