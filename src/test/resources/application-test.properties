# In-memory DB for tests (no MySQL required)
spring.datasource.url=jdbc:h2:mem:testenglish;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Tránh chạy data.sql (MySQL) trên H2
spring.sql.init.mode=never
spring.mail.host=localhost
spring.mail.port=3025

# JWT for @SpringBootTest (Base64; short values are hashed in JwtService)
